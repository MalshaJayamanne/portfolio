<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Malsha Jayamanne - Developer Portfolio</title>
    <meta name="description" content="Portfolio of Malsha Jayamanne — Software Engineering undergraduate specializing in AI/ML, Data Analytics, and Full Stack Development." />
    <meta name="author" content="Malsha Jayamanne" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Malsha Jayamanne — Software Engineer Portfolio" />
    <meta property="og:description" content="Portfolio showcasing projects across AI/ML, Data Analytics, and Full Stack Development." />
    <meta property="og:type" content="website" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/src/assets/avatar.jpg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Dark mode init (prevent flash) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
